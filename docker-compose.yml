version: "3.9"

services:
  # ─── PostgreSQL + pgvector ───────────────────────────────────
  postgres:
    image: ankane/pgvector:v0.7.0
    container_name: aiwa-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aiwa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiwa_secure_pass_2026}
      POSTGRES_DB: ${POSTGRES_DB:-aiwa_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiwa"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aiwa-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Backend API ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aiwa-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://aiwa:aiwa_secure_pass_2026@postgres:5432/aiwa_db
      - SYNC_DATABASE_URL=postgresql+psycopg2://aiwa:aiwa_secure_pass_2026@postgres:5432/aiwa_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-use-32-char-key}
      - BRIDGE_WEBHOOK_SECRET=${BRIDGE_WEBHOOK_SECRET:-change-me}
      - BRIDGE_URL=http://bridge:3001
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - ENVIRONMENT=production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ─── WhatsApp Bridge (Meta Cloud API) ────────────────────────
  bridge:
    build:
      context: ./whatsapp-bridge
      dockerfile: Dockerfile
    container_name: aiwa-bridge
    environment:
      - PORT=3001
      - BACKEND_URL=http://backend:8000
      - BRIDGE_WEBHOOK_SECRET=${BRIDGE_WEBHOOK_SECRET:-change-me}
      - WHATSAPP_WEBHOOK_VERIFY_TOKEN=${WHATSAPP_WEBHOOK_VERIFY_TOKEN:-change-me}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID:-}
      - META_ACCESS_TOKEN=${META_ACCESS_TOKEN:-}
      - META_APP_SECRET=${META_APP_SECRET:-}
      - LOG_LEVEL=info
    ports:
      - "3001:3001"
    depends_on:
      - backend
    restart: unless-stopped

  # ─── Nginx ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: aiwa-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - bridge
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: