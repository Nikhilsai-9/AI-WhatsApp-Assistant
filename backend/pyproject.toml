[tool.ruff]
line-length = 110
target-version = "py311"
extend-exclude = ["alembic", ".venv", "tests/fixtures"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "N", "ASYNC", "S", "RUF"]
ignore = ["S101", "S104", "E501"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S", "B"]
"alembic/**" = ["E", "F"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-q"

[tool.mypy]
python_version = "3.11"
strict_optional = true
ignore_missing_imports = true
